<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Как в staround</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    width: 100%;
    background: #0a0f23;
}
canvas {
    position: fixed;
    inset: 0;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
});

const NEAR_STAR_COUNT = 60;
const FAR_STAR_COUNT = 400;
const VERY_FAR_STAR_COUNT = 5800;

class NearStar {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.baseSize = Math.random() * 2 + 2;
        this.size = this.baseSize;
        this.angle = Math.PI / 6 + (Math.random() * Math.PI / 12);
        this.opacity = 0;
        this.state = 'wait';
        this.delay = Math.random() * 1500;
        this.startTime = Date.now();
        this.driftPhase = Math.random() * Math.PI * 2;
    }
    update() {
        const elapsed = Date.now() - this.startTime;
        if(this.state==='wait'){
            this.opacity = Math.min(1, elapsed/500);
            this.size = this.baseSize + Math.sin((elapsed/800)+this.driftPhase)*0.7;
            if(elapsed>this.delay) this.state='fall';
        } else if(this.state==='fall'){
            this.x -= Math.cos(this.angle)*2.5;
            this.y += Math.sin(this.angle)*2.5;
            this.opacity -= 0.004;
            this.size = this.baseSize + Math.sin((elapsed/400)+this.driftPhase)*0.7;
            if(this.opacity<=0 || this.x<-50 || this.y>h+50) this.reset();
        }
    }
    draw() {
        ctx.save();
        ctx.translate(this.x,this.y);
        ctx.rotate(Math.PI/4);
        ctx.globalAlpha=this.opacity;
        ctx.strokeStyle='white';
        ctx.lineWidth=1.2;
        ctx.beginPath();
        ctx.moveTo(-this.size,0);
        ctx.lineTo(this.size,0);
        ctx.moveTo(0,-this.size);
        ctx.lineTo(0,this.size);
        ctx.stroke();
        ctx.restore();
    }
}

class FarStar {
    constructor(){
        this.x = Math.random()*w;
        this.y = Math.random()*h;
        this.size = Math.random()*1.5+0.5;
        this.opacity = Math.random()*0.3+0.2;
        this.flickerSpeed = Math.random()*0.001+0.0005;
        this.flickerDir = Math.random()>0.5?1:-1;
    }
    update(){
        this.opacity += this.flickerSpeed*this.flickerDir;
        if(this.opacity>0.5) this.flickerDir=-1;
        if(this.opacity<0.2) this.flickerDir=1;
    }
    draw(){
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle='white';
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

class VeryFarStar {
    constructor(){
        this.x = Math.random()*w;
        this.y = Math.random()*h;
        this.size = Math.random()*0.7 + 0.2;
        this.opacity = Math.random()*0.3 + 0.1;
        this.flickerSpeed = Math.random()*0.0005 + 0.0002;
        this.flickerDir = Math.random()>0.5 ? 1 : -1;
    }
    update(){
        this.opacity += this.flickerSpeed * this.flickerDir;
        if(this.opacity > 0.4) this.flickerDir = -1;
        if(this.opacity < 0.1) this.flickerDir = 1;
    }
    draw(){
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

const nearStars = [], farStars=[], veryFarStars=[];
for(let i=0;i<NEAR_STAR_COUNT;i++) nearStars.push(new NearStar());
for(let i=0;i<FAR_STAR_COUNT;i++) farStars.push(new FarStar());
for(let i=0;i<VERY_FAR_STAR_COUNT;i++) veryFarStars.push(new VeryFarStar());

const nebulaCanvas = document.createElement('canvas');
nebulaCanvas.width = w;
nebulaCanvas.height = h;
const nebulaCtx = nebulaCanvas.getContext('2d');

function createNebula() {
    const grad = nebulaCtx.createRadialGradient(w/2,h/2,w*0.1,w/2,h/2,w*0.8);
    grad.addColorStop(0,'rgba(80,0,80,0.15)');
    grad.addColorStop(0.3,'rgba(20,0,40,0.1)');
    grad.addColorStop(0.7,'rgba(0,0,20,0.05)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    nebulaCtx.fillStyle = grad;
    nebulaCtx.fillRect(0,0,w,h);
}
createNebula();

function drawBackground(){
    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,'#2b0038');
    grad.addColorStop(0.5,'#0a0f23');
    grad.addColorStop(1,'#0f1a3b');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,w,h);
}

function animate(){
    drawBackground();
    veryFarStars.forEach(s=>{s.update(); s.draw();}); // третий слой
    farStars.forEach(s=>{s.update();s.draw();});
    nearStars.forEach(s=>{s.update();s.draw();});
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
